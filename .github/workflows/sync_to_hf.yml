name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # Runs every time you push to the 'main' branch
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Ensures large files like your .pth weights are synced properly
          
      - name: Push entire repo to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |          
          # 1. Delete GitHub commit history to remove non-LFS large files
          rm -rf .git
          
          # 2. Start a fresh git repository specifically for Hugging Face
          git init
          git checkout -b main
          
          # 3. Force Git LFS to track your model weights
          git lfs install
          git lfs track "*.pth"
          git lfs track "*.png"
          git lfs track "*.jpg"
          git lfs track "*.jpeg"
          
          # 4. Commit the files cleanly using LFS
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          git add .
          git commit -m "Auto-sync from GitHub (with LFS enabled)" 
          git push --force https://mavp309:$HF_TOKEN@huggingface.co/spaces/mavp309/Road-Extraction-AI main
