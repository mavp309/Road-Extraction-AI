name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # Runs every time you push to the 'main' branch
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Ensures large files like your .pth weights are synced properly
          
      - name: Push entire repo to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          
          cp ./app.py .
          cp ./requirements.txt .
          
          git add app.py requirements.txt
          git commit -m "Bring app.py to root for Hugging Face boot"
          
          # 2. PUSH THE ENTIRE REPOSITORY (Update the URL!)
          git push --force https://mavp309:$HF_TOKEN@huggingface.co/spaces/mavp309/Road-Extraction-AI HEAD:main
